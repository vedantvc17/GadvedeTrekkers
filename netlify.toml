# ─────────────────────────────────────────────
#  Gadvede Trekkers — Netlify Deployment Config
#  Domain: https://www.gadvede.com
# ─────────────────────────────────────────────

[build]
  command   = "npm run build"
  publish   = "dist"

# ── Environment variables (override in Netlify dashboard for secrets) ──
[build.environment]
  NODE_VERSION = "20"

# ── SPA fallback: all routes → index.html (React Router handles routing) ──
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Redirect bare domain → www ──
[[redirects]]
  from   = "https://gadvede.com/*"
  to     = "https://www.gadvede.com/:splat"
  status = 301
  force  = true

# ── HTTP → HTTPS ──
[[redirects]]
  from   = "http://www.gadvede.com/*"
  to     = "https://www.gadvede.com/:splat"
  status = 301
  force  = true

# ── Security & performance headers ──
# Cache-Control here is intentionally no-cache so that SPA routes (/tours, /treks, etc.)
# always fetch the latest index.html from Netlify. The /assets/* rule below overrides
# this for hashed JS/CSS bundles (which should be cached forever).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"
    Cache-Control              = "no-cache, no-store, must-revalidate"
    Pragma                     = "no-cache"

# ── Cache static assets aggressively ──
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# ── Do NOT cache HTML (always fresh for SPA updates) ──
# Covers the root, explicit index.html, and all SPA sub-routes (e.g. /tours, /treks)
# so that mobile browsers always fetch the latest bundle references.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"
